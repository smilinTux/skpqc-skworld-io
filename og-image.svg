<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060612"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <radialGradient id="glow1" cx="18%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffa500" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffa500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="86%" cy="82%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffa500"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- subtle lattice motif (top-right) -->
  <g stroke="#22d3ee" stroke-opacity="0.16" stroke-width="1.5" fill="none">
    <path d="M860,60 L960,60 L1060,60 L1140,60 M860,140 L960,140 L1060,140 L1140,140 M860,220 L960,220 L1060,220 L1140,220"/>
    <path d="M860,60 L860,140 L860,220 M960,60 L960,140 L960,220 M1060,60 L1060,140 L1060,220 M1140,60 L1140,140 L1140,220"/>
    <path d="M860,60 L960,140 L1060,220 M960,60 L1060,140 L1140,220 M1060,60 L1140,140 M860,140 L960,220"/>
  </g>
  <g fill="#22d3ee" fill-opacity="0.5">
    <circle cx="860" cy="60" r="4"/><circle cx="960" cy="60" r="4"/><circle cx="1060" cy="60" r="4"/><circle cx="1140" cy="60" r="4"/>
    <circle cx="860" cy="140" r="4"/><circle cx="960" cy="140" r="4"/><circle cx="1060" cy="140" r="4"/><circle cx="1140" cy="140" r="4"/>
    <circle cx="860" cy="220" r="4"/><circle cx="960" cy="220" r="4"/><circle cx="1060" cy="220" r="4"/><circle cx="1140" cy="220" r="4"/>
  </g>

  <!-- border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="22" fill="none" stroke="#ffa500" stroke-opacity="0.18" stroke-width="2"/>

  <!-- top brand row -->
  <circle cx="92" cy="98" r="13" fill="none" stroke="#ffd700" stroke-width="3"/>
  <line x1="101" y1="107" x2="112" y2="118" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  <text x="124" y="108" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="30" fill="#ffd700" font-weight="700">sk_pqc ⚛️</text>
  <text x="80" y="142" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="19" fill="#22d3ee" letter-spacing="3">SKWORLD · SOVEREIGN POST-QUANTUM · APACHE-2.0</text>

  <!-- title -->
  <text x="80" y="248" font-family="'Inter','DejaVu Sans',sans-serif" font-size="66" font-weight="700" fill="url(#title)">Post-quantum crypto</text>
  <text x="80" y="324" font-family="'Inter','DejaVu Sans',sans-serif" font-size="66" font-weight="700" fill="url(#title)">you can actually install</text>
  <text x="80" y="368" font-family="'Inter','DejaVu Sans',sans-serif" font-size="25" font-style="italic" fill="rgba(255,255,255,0.55)">Hybrid X25519 + ML-KEM-768 · one wire format across Python · Dart · Rust</text>

  <!-- install chips -->
  <g font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="24" font-weight="700">
    <rect x="80"  y="410" width="320" height="56" rx="12" fill="#ffa500" fill-opacity="0.10" stroke="#ffa500" stroke-opacity="0.4" stroke-width="2"/>
    <text x="104" y="446" fill="#ffd700">pip install sk-pqc</text>
    <rect x="420" y="410" width="320" height="56" rx="12" fill="#22d3ee" fill-opacity="0.10" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="2"/>
    <text x="444" y="446" fill="#22d3ee">dart pub add sk_pqc</text>
    <rect x="760" y="410" width="300" height="56" rx="12" fill="#ff6b35" fill-opacity="0.10" stroke="#ff6b35" stroke-opacity="0.4" stroke-width="2"/>
    <text x="784" y="446" fill="#ff8c5a">cargo add sk-pqc</text>
  </g>

  <!-- honest chip -->
  <rect x="80" y="496" width="640" height="48" rx="24" fill="#9ca3af" fill-opacity="0.10" stroke="#9ca3af" stroke-opacity="0.4" stroke-width="2"/>
  <text x="104" y="527" font-family="'Inter','DejaVu Sans',sans-serif" font-size="21" fill="rgba(255,255,255,0.7)">Experimental · unaudited · secure if <tspan font-style="italic">either</tspan> leg holds</text>

  <!-- footer line -->
  <text x="80" y="586" font-family="'Inter','DejaVu Sans',sans-serif" font-size="21" fill="rgba(255,255,255,0.45)">post-quantum, never "quantum-proof" · skpqc.skworld.io</text>
</svg>
